<div class="d-flex justify-content-start mb-3">
  <button mat-raised-button color="warn" (click)="handleBack()">← Back</button>
</div>

<ng-container *ngIf="loadingPage; else content">
  <div class="mt-5 d-flex justify-content-center">
    <mat-spinner diameter="80" color="primary"></mat-spinner>
  </div>
</ng-container>

<ng-template #content>
  <div class="mt-3">
    <h3 class="text-center">Product</h3>
  </div>

  <form class="p-4 border rounded shadow-sm">
    <mat-form-field appearance="outline" class="w-100 mb-3">
      <mat-label>Name</mat-label>
      <input
        matInput
        [value]="
          product
            ? product.name + ' ' + product.code + ' ' + product.category
            : ''
        "
        disabled
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100 mb-3">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        rows="4"
        [value]="
          product
            ? product.description +
              '\nPrice: ' +
              product.price +
              '\nStock: ' +
              product.stock
            : ''
        "
        disabled
      ></textarea>
    </mat-form-field>
  </form>

  <div class="mt-5">
    <h3 class="text-center">Movements Product</h3>
  </div>

  <div class="pb-4">
    <table mat-table [dataSource]="movements" class="mat-elevation-z2 w-100">
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let element">{{ element.date }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let element">{{ element.type }}</td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let element">{{ element.amount }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let element">{{ element.description }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</ng-template>
