<div class="mb-4">
  <button mat-button color="warn" (click)="handleBack()">← Back</button>
</div>

<h3 class="text-center">Edit Product</h3>

<div
  *ngIf="loadingPage"
  class="d-flex justify-content-center align-items-center"
  style="height: 300px"
>
  <mat-progress-spinner
    diameter="50"
    mode="indeterminate"
  ></mat-progress-spinner>
</div>

<form
  [formGroup]="form"
  (ngSubmit)="editProduct()"
  *ngIf="!loadingPage"
  class="p-4 border rounded shadow-sm"
>
  <mat-form-field appearance="fill" class="w-100 mb-3">
    <mat-label>Name</mat-label>
    <input matInput formControlName="name" required />
  </mat-form-field>

  <mat-form-field appearance="fill" class="w-100 mb-3">
    <mat-label>Description</mat-label>
    <textarea
      matInput
      rows="3"
      formControlName="description"
      required
    ></textarea>
  </mat-form-field>

  <mat-form-field appearance="fill" class="w-100 mb-3">
    <mat-label>Category</mat-label>
    <input matInput formControlName="category" required />
  </mat-form-field>

  <mat-form-field appearance="fill" class="w-100 mb-3">
    <mat-label>Code</mat-label>
    <input matInput formControlName="code" required />
  </mat-form-field>

  <mat-form-field appearance="fill" class="w-100 mb-3">
    <mat-label>Price</mat-label>
    <input
      matInput
      type="number"
      step="0.01"
      formControlName="price"
      required
    />
  </mat-form-field>

  <mat-form-field appearance="fill" class="w-100 mb-3">
    <mat-label>Stock</mat-label>
    <input matInput type="number" formControlName="stock" required />
  </mat-form-field>

  <mat-checkbox formControlName="active">Active</mat-checkbox>

  <div class="mt-4">
    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="loadingUpdate"
    >
      <mat-spinner *ngIf="loadingUpdate" diameter="20"></mat-spinner>
      <span *ngIf="!loadingUpdate">Update Product</span>
    </button>
  </div>
</form>
