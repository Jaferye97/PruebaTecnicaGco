<div class="d-flex justify-content-start mb-3">
  <button mat-stroked-button color="warn" (click)="handleBack()">← Back</button>
</div>

<h3 class="text-center mb-4">Create Product</h3>

<form
  [formGroup]="form"
  (ngSubmit)="createProduct()"
  class="p-4 border rounded shadow-sm mat-elevation-z2"
>
  <mat-form-field class="w-100 mb-3">
    <mat-label>Name</mat-label>
    <input matInput formControlName="name" required />
  </mat-form-field>

  <mat-form-field class="w-100 mb-3">
    <mat-label>Description</mat-label>
    <textarea
      matInput
      formControlName="description"
      rows="3"
      required
    ></textarea>
  </mat-form-field>

  <mat-form-field class="w-100 mb-3">
    <mat-label>Category</mat-label>
    <input matInput formControlName="category" required />
  </mat-form-field>

  <mat-form-field class="w-100 mb-3">
    <mat-label>Code</mat-label>
    <input matInput formControlName="code" required />
  </mat-form-field>

  <mat-form-field class="w-100 mb-3">
    <mat-label>Price</mat-label>
    <input
      matInput
      type="number"
      formControlName="price"
      step="0.01"
      required
    />
  </mat-form-field>

  <mat-form-field class="w-100 mb-4">
    <mat-label>Stock</mat-label>
    <input matInput type="number" formControlName="stock" required />
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    type="submit"
    [disabled]="loadingCreate || form.invalid"
  >
    <mat-spinner *ngIf="loadingCreate" diameter="20"></mat-spinner>
    <span *ngIf="!loadingCreate">Create Product</span>
  </button>
</form>
