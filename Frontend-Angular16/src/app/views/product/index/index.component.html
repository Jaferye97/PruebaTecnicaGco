<mat-card>
  <h3 class="text-center">Products</h3>
</mat-card>

<div *ngIf="loading" class="text-center mt-5">
  <mat-progress-spinner
    diameter="50"
    mode="indeterminate"
  ></mat-progress-spinner>
</div>

<table class="table table-hover" *ngIf="!loading && products.length > 0">
  <thead class="thead-light text-center">
    <tr>
      <th>Código</th>
      <th>Nombre</th>
      <th>Categoría</th>
      <th>Stock</th>
      <th>Precio</th>
      <th>Descripción</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr class="text-center" *ngFor="let product of products">
      <td class="align-middle">{{ product.code }}</td>
      <td class="align-middle">{{ product.name }}</td>
      <td class="align-middle">{{ product.category }}</td>
      <td class="align-middle">{{ product.stock }}</td>
      <td class="align-middle">{{ product.price | currency }}</td>
      <td class="align-middle">{{ product.description }}</td>
      <td class="align-middle">
        <span
          [ngClass]="{
            'text-success': product.active,
            'text-danger': !product.active
          }"
        >
          {{ product.active ? "Activo" : "Inactivo" }}
        </span>
      </td>
      <td class="align-middle">
        <button mat-icon-button color="primary">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </tr>
  </tbody>
</table>

<div *ngIf="!loading && products.length === 0" class="text-center mt-4">
  <p>No hay productos disponibles.</p>
</div>
